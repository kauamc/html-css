<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prática</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            width: 100vw;
        }
        .container {
            background-color: rgb(223, 223, 223);
            padding: 10px;
            max-width: 800px;
            height: 100vh;
            display: flex;
            flex-flow: row wrap;
            justify-content: space-evenly;
            align-content: flex-start;
            margin: auto;
        }
        .item {
            background-color: grey;
            border-radius: 15px;
            padding: 10px;
            margin: 10px;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            flex: 1 0 auto;
        }
        .item > h1 {
            font-size: 1.3em;
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <div class="item" id="cx1"><h1>Nome</h1><p>República Federativa do Brasil</p></div>
            <div class="item" id="cx3"><h1>Lema</h1><p><i>Ordem e Progresso</i></p></div>
            <div class="item" id="cx2"><h1>Área</h1><p>8.515.767,049 km²</p></div>
            <div class="item" id="cx3"><h1>População</h1><p>213,4 M</p></div>
            <div class="item" id="cx3"><h1>IDH</h1><p>0,786</p></div>
            <div class="item" id="cx3"><h1>PIB</h1><p>USD 2,268 T</p></div>
        </div>
    </main>
</body>
</html>
