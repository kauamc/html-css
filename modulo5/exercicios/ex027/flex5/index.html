<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        main {
            background-color: salmon;
            width: 100vw;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }
        .d1, .d2 {
            width: 300px;
            height: 300px;
            margin: 25px;

            display: flex;
            justify-content: center;
            align-items: stretch;
        }
        .d1 {
            background-color: bisque;
        }
        .d1 > div {
            width: 50%;
            background-color: aqua;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
        }
        .d1 > div > div {
            width: 100%;
            height: 30px;
            background-color: violet;
        }
        .d2 {
            background-color: chartreuse;
        }
    </style>
</head>
<body>
    <main>
        <div class="d1">
            <div>
                <div></div>
                <div></div>
                <div></div>
            </div>
        </div>
        <div class="d2"></div>
    </main>
</body>
</html>
