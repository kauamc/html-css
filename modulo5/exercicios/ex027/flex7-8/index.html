<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .container {
            width: 100%;
            height: 500px;
            background-color: aqua;
            margin: auto;
            display: flex;
            flex-flow: row wrap;
        }
        .bloco {
            width: 200px;
            height: 200px;
        }
        #b1 {
            background-color: orange;
            align-self: auto;
        }
        #b2 {
            background-color: orangered;
            align-self: flex-start;
        }
        #b3 {
            background-color: orchid;
            align-self: flex-end;
        }
        #b4 {
            background-color: greenyellow;
            align-self: center;
        }
        #b5 {
            background-color: tan;
            height: auto;
            align-self: stretch;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bloco" id="b1"></div>
        <div class="bloco" id="b2"></div>
        <div class="bloco" id="b3"></div>
        <div class="bloco" id="b4"></div>
        <div class="bloco" id="b5"></div>
    </div>
</body>
</html>
