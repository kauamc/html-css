<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            background-color: aquamarine;
            display: flex; /* o elemeento pai é quem recebe o display flex */
            flex-direction: row-reverse; /* padrão, esquerda para direita em regiões que lê nessa direção 
                                    Há também:
                                    - row-reverse (direita para esquerda)
                                    - Column (cima para baixo) e
                                    - column-reverse: baixo para cima (automaticamente em idiomas que lê assim) */
        }
        .item {
            background-color: cadetblue;
            border: 1px solid black;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">A</div>
        <div class="item">B</div>
        <div class="item">C</div>
        <div class="item">D</div>
        <div class="item">E</div>
    </div>
</body>
</html>
