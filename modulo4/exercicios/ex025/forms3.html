<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms 3</title>
</head>
<body>
    <form action="cadastro" method="get" autocomplete="on">
        <p>
            <label for="inome">Nome: </label>
            <input type="text" name="Nome" id="inome" maxlength="35" autocomplete="name" required>
        </p>
        <p>
            <label for="imedia">Média: </label>
            <input type="number" name="media" id="imedia" min="0" max="10" required step="0.1" value="5"> 
        </p>
        <p>
            <label for="imes">Período letivo: </label>
            <input type="month" name="mes" id="imes">
        </p>
        <p>
            <label for="inasc">Data de nascimento: </label>
            <input type="date" name="nasc" id="inasc" required>
        </p>
        <p>
            <label for="ihora">Horário da prova: </label>
            <input type="time" name="hora" id="ihora">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Recomeçar">
        </p>
    </form>
</body>
</html>
