<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Geral */
        * {
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            background-color: #233eff;
            background-size: contain;
            background-repeat: no-repeat;
        }

        h1 {
            color: white;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            padding: 10px;
        }
        /* Retrato */
        @media screen and (orientation: portrait) {
            body {
                background-image: url(../pacote-imagens-cap25/imagens/cev-portrait.jpg); 
                background-position: center bottom;
            }

            h1 {
                color: black;
            }
        }
        /* Paisagem */
        @media screen and (orientation: landscape) {
            body {
                background-image: url(../pacote-imagens-cap25/imagens/cev-landscape.jpg);
                background-position: left bottom;
            }
        }
    </style>
</head>
<body>
    <h1>Arquivo que muda em paisagem e retrato</h1>
</body>
</html>
